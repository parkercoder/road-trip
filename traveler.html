<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta name="description" content="A mobile-first road trip map with swipeable travel cards, route overlays, location sharing, and hazard alerts.">
  <meta name="theme-color" content="#fffcef">
  <title>Road Trip Traveler</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --card: rgba(255, 252, 239, .97);
      --card-solid: #fffcef;
      --text: #172033;
      --muted: #667085;
      --line: rgba(23, 32, 51, .16);
      --primary: #0f5fd7;
      --primary-text: #fff;
      --out: #1769d1;
      --back: #d46a1f;
      --ferry: #7c3aed;
      --camp: #238642;
      --hotel: #277a9f;
      --activity: #b23b3b;
      --charge: #c89b16;
      --warn: #f59e0b;
      --warn-soft: #fff1d6;
      --ok: #dff4df;
      --shadow: 0 12px 34px rgba(23, 32, 51, .2);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --card: rgba(24, 32, 45, .97);
        --card-solid: #18202d;
        --text: #f6f7fb;
        --muted: #a9b3c3;
        --line: rgba(246, 247, 251, .18);
        --warn-soft: rgba(245, 158, 11, .2);
        --ok: rgba(34, 197, 94, .18);
        --shadow: 0 12px 34px rgba(0, 0, 0, .42);
      }
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      color: var(--text);
      background: #dbe8df;
    }

    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      color: var(--text);
      background: #dbe8df;
    }

    button,
    a { font: inherit; }

    .app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: #dbe8df;
      touch-action: none;
    }

    @supports (height: 100dvh) {
      html,
      body,
      .app,
      #map { height: 100dvh; }
    }

    .leaflet-container,
    .leaflet-pane,
    .leaflet-map-pane,
    .leaflet-tile-pane,
    .leaflet-overlay-pane,
    .leaflet-route-pane,
    .leaflet-marker-pane,
    .leaflet-control-container {
      touch-action: none;
    }

    .leaflet-route-pane {
      z-index: 430;
    }

    .leaflet-control-zoom {
      display: none;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 14px;
    }

    .leaflet-popup-content {
      min-width: 190px;
      margin: 12px;
      line-height: 1.35;
      font-size: 13px;
    }

    .leaflet-popup-content b {
      display: block;
      margin-bottom: 4px;
    }

    .popup-share {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      margin: 7px 0 0 auto;
      padding: 0;
      border: 1px solid rgba(23, 32, 51, .12);
      border-radius: 999px;
      background: #f1f3f4;
      color: #1a73e8;
      box-shadow: 0 1px 3px rgba(23, 32, 51, .12);
    }

    .popup-share svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .popup-share.copied {
      background: #dff4df;
      color: #187a35;
    }

    .pin {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 999px;
      box-shadow: 0 2px 9px rgba(23, 32, 51, .28);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
    }

    .pin.camp { background: var(--camp); }
    .pin.hotel { background: var(--hotel); }
    .pin.activity { background: var(--activity); }
    .pin.charge { background: var(--charge); color: #1f2937; }
    .pin.ferry { background: var(--ferry); }
    .pin.home { background: #1f6f54; }
    .pin.warn { background: #d73320; }

    .model-y-pin {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 9px;
      border: 2px solid rgba(255, 255, 255, .75);
      border-radius: 999px;
      background: var(--primary);
      color: var(--primary-text);
      box-shadow: var(--shadow);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .bottom-strip {
      position: absolute;
      left: calc(env(safe-area-inset-left) + 44px);
      right: calc(env(safe-area-inset-right) + 10px);
      z-index: 4;
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .bottom-strip {
      bottom: calc(env(safe-area-inset-bottom) + 12px);
    }

    .pill,
    .summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .82);
      color: #172033;
      box-shadow: 0 3px 14px rgba(23, 32, 51, .08);
      backdrop-filter: blur(12px);
    }

    .pill {
      width: fit-content;
      max-width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .summary {
      justify-content: space-between;
      width: 100%;
      padding: 10px 12px;
      border-radius: 18px;
      font-size: 13px;
      font-weight: 700;
    }

    .summary small,
    .muted {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .map-tools {
      position: absolute;
      right: calc(env(safe-area-inset-right) + 12px);
      bottom: calc(env(safe-area-inset-bottom) + 116px);
      z-index: 4;
      display: flex;
      flex-direction: row;
      gap: 8px;
    }

    .load-status {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 104px);
      left: 50%;
      z-index: 7;
      transform: translateX(-50%);
      max-width: min(86vw, 320px);
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .9);
      color: #172033;
      box-shadow: 0 3px 14px rgba(23, 32, 51, .12);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    body.map-ready .load-status {
      opacity: 0;
      transform: translateX(-50%) translateY(-8px);
      transition: opacity .25s ease, transform .25s ease;
    }

    .map-tool {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .84);
      color: #172033;
      box-shadow: 0 3px 14px rgba(23, 32, 51, .12);
      backdrop-filter: blur(12px);
      text-decoration: none;
    }

    .edge-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 5;
      width: 18px;
      touch-action: none;
      background: transparent;
    }

    .drawer {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 8;
      width: min(86vw, 340px);
      display: grid;
      grid-template-rows: auto 1fr;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--card-solid);
      border-right: 1px solid var(--line);
      box-shadow: 10px 0 28px rgba(23, 32, 51, .24);
      transform: translateX(-100%);
      transition: transform .24s ease;
      will-change: transform;
      touch-action: pan-y;
    }

    .drawer.open { transform: translateX(0); }

    .handle {
      position: absolute;
      top: 50%;
      right: -48px;
      width: 48px;
      height: 58px;
      transform: translateY(-50%);
      border: 0;
      border-radius: 0 999px 999px 0;
      background: var(--card-solid);
      color: #173b63;
      box-shadow: 7px 4px 14px rgba(23, 32, 51, .2);
      touch-action: none;
    }

    .handle-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .handle-rv {
      width: 42px;
      height: 27px;
      flex: 0 0 auto;
      overflow: visible;
      transform-origin: center;
      transition: transform .24s ease;
    }

    .drawer.open .handle {
      right: -48px;
      width: 48px;
      height: 58px;
    }

    .drawer.open .handle-rv { transform: scaleX(-1); }

    .drawer-head {
      display: grid;
      gap: 9px;
      padding: 14px 12px 10px;
      border-bottom: 1px solid var(--line);
    }

    .drawer-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.16;
    }

    h1 { font-size: 17px; }
    h2 { font-size: 16px; }

    .close {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      font-size: 18px;
    }

    .alert-line {
      display: grid;
      gap: 2px;
      padding: 9px;
      border: 1px solid rgba(245, 158, 11, .7);
      border-radius: 14px;
      background: var(--warn-soft);
      font-size: 13px;
      font-weight: 700;
    }

    .cards {
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 10px 10px 18px;
      scroll-padding-top: 10px;
    }

    .card {
      display: grid;
      gap: 9px;
      margin-bottom: 10px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card-solid);
    }

    .card.today { border: 2px solid var(--primary); }
    .card.watch { border: 3px solid var(--warn); }
    .card.selected {
      outline: 2px solid rgba(15, 95, 215, .32);
      outline-offset: 2px;
    }

    .card-top {
      display: grid;
      gap: 3px;
    }

    .chips,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(127, 127, 127, .08);
      font-size: 12px;
      font-weight: 700;
    }

    .chip.ok { background: var(--ok); }
    .chip.watch { background: var(--warn-soft); }

    .action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(127, 127, 127, .08);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }

    .action.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--primary-text);
    }

    .mini-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
      line-height: 1.35;
    }

    .mini-list li {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 5px;
      align-items: start;
    }

    .directions {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      font-size: 13px;
    }

    .directions summary {
      cursor: pointer;
      color: var(--primary);
      font-weight: 800;
    }

    .directions ol {
      display: grid;
      gap: 0;
      margin: 9px 0 0;
      padding-left: 25px;
    }

    .directions li {
      padding: 7px 0 7px 3px;
      border-bottom: 1px solid rgba(127, 127, 127, .16);
    }

    .directions li span,
    .directions li small {
      display: block;
    }

    .directions li small {
      margin-top: 2px;
      color: var(--muted);
      font-weight: 700;
    }

    .directions li.direction-mode {
      margin-left: -22px;
      padding: 9px 8px;
      border: 0;
      border-radius: 9px;
      background: rgba(20, 128, 94, .1);
      color: var(--text);
      font-weight: 850;
      list-style: none;
    }

    .directions li.direction-mode.unresolved {
      color: #9a3412;
      background: #fff7ed;
    }

    .directions li.direction-warning {
      display: block;
      color: #9a3412;
      background: #fffaf0;
      line-height: 1.45;
    }

    .fallback {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      place-items: center;
      padding: 24px;
      color: #172033;
      background: #dbe8df;
      text-align: center;
    }

    .fallback-card {
      display: grid;
      gap: 10px;
      width: min(100%, 420px);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card-solid);
      box-shadow: var(--shadow);
    }

    .fallback-card strong { font-size: 18px; }

    .fallback-card span {
      color: var(--muted);
      line-height: 1.45;
    }

    .fallback-card a {
      justify-self: center;
      padding: 8px 12px;
      border-radius: 10px;
      background: var(--primary);
      color: var(--primary-text);
      text-decoration: none;
      font-weight: 700;
    }

    body.map-error .fallback { display: grid; }

    @media (prefers-reduced-motion: reduce) {
      .drawer { transition: none; }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Travel map with drawer cards">
    <div id="map" aria-label="完整路线地图"></div>
    <div class="fallback" role="alert">
      <div class="fallback-card">
        <strong>行程无法载入</strong>
        <span data-error-detail>请检查行程地址和 TripPlan 内容。</span>
        <a href="./">打开默认行程</a>
      </div>
    </div>
    <div class="edge-zone" data-edge aria-label="Swipe from left edge to open cards"></div>
    <div class="load-status" data-load-status>正在加载真实地图…</div>

    <div class="map-tools">
      <a class="map-tool" data-edit-trip href="studio.html" aria-label="在 Studio 中编辑行程">✎</a>
      <button class="map-tool" type="button" data-fit aria-label="显示完整路线">[&nbsp;]</button>
      <button class="map-tool" type="button" data-locate aria-label="显示当前位置">📍</button>
    </div>

    <div class="bottom-strip">
      <div class="summary"><span data-selected-summary>正在载入行程…</span><small>当前卡片</small></div>
      <div class="summary"><span data-route-status>正在检查实际路线…</span><small>Route data</small></div>
    </div>

    <aside class="drawer" data-drawer aria-label="Travel card drawer">
      <button class="handle" type="button" data-handle aria-expanded="false" aria-label="打开 Road Trip 行程卡">
        <span class="handle-logo" aria-hidden="true">
          <svg class="handle-rv" viewBox="0 0 84 48" role="img">
            <path d="M8 12Q9 5 18 5h42q10 0 15 10l4 10v12H5V16q0-4 3-4Z" fill="#f6f0dc" stroke="currentColor" stroke-width="2.4"/>
            <path d="M5 26h74v11H5Z" fill="#2c7d87"/>
            <path d="M12 11h18v11H12Zm22 0h18v11H34Zm22 0h8q6 1 9 11H56Z" fill="#8ec6d2" stroke="currentColor" stroke-width="1.7"/>
            <path d="M56 23h18M42 26v11M8 26h34" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M63 26h13v8H63l-6-4Z" fill="#f6f0dc" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="75" cy="30" r="2.2" fill="#f7cf58" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="18" cy="37" r="7" fill="#f7cf58" stroke="currentColor" stroke-width="3"/>
            <circle cx="66" cy="37" r="7" fill="#f7cf58" stroke="currentColor" stroke-width="3"/>
            <circle cx="18" cy="37" r="2.2" fill="currentColor"/>
            <circle cx="66" cy="37" r="2.2" fill="currentColor"/>
          </svg>
        </span>
      </button>

      <header class="drawer-head">
        <div class="drawer-title">
          <div>
            <div class="muted" data-trip-title>Road Trip</div>
            <h1 data-app-title>Traveler</h1>
          </div>
          <button class="close" type="button" data-close aria-label="Close cards">‹</button>
        </div>
        <div class="alert-line">
          <span>天气、山火和道路预警由临时数据源提供</span>
          <span class="muted">地图上的景点和 watch 点可以点击跳转卡片</span>
        </div>
      </header>

      <section class="cards" data-cards aria-label="Scrollable travel cards"></section>
    </aside>
  </main>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script type="module" src="src/traveler-app.mjs?v=20260719-10"></script>
</body>
</html>
