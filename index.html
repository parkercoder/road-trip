<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Road Trip redirects to Trip Builder by default.">
  <meta http-equiv="refresh" content="0; url=studio.html">
  <title>Road Trip · Trip Builder</title>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const target = params.has("trip") || params.has("draft") ? "traveler.html" : "studio.html";
      window.location.replace(`${target}${window.location.search}${window.location.hash}`);
    })();
  </script>
</head>
<body>
  <p>
    Redirecting to <a href="studio.html">Trip Builder</a>…
    正在前往 <a href="studio.html">Trip Builder</a>……
  </p>
</body>
</html>
