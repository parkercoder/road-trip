name: Bug report / 错误报告
description: Report a reproducible problem / 报告可复现的问题
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened? / 发生了什么？
      description: Include the expected and actual behavior. / 请说明预期行为与实际行为。
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and browser / 设备与浏览器
      placeholder: iPhone 15, Safari 18 / iPhone 15、Safari 18
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check / 隐私检查
      options:
        - label: I removed reservation numbers, personal details, and live location data. / 我已删除预订编号、个人信息和实时位置数据。
          required: true
